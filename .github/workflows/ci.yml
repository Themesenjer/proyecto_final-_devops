name: CI/CD Pipeline - Habit Tracker Production

on:
  push:
    branches: [ "main" ]

jobs:
  # --- BLOQUE 1: COMPILAR Y SUBIR IMÁGENES A GITHUB PACKAGES (GHCR) ---
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compilar y subir imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.actor }}/proyecto_final-backend:latest

      - name: Compilar y subir imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.actor }}/proyecto_final-frontend:latest

  # --- BLOQUE 2: DESPLIEGUE CONTINUO EN EL VPS VIA SSH ---
  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código para transferir el compose de producción
        uses: actions/checkout@v4

      - name: Desplegar en el VPS usando comandos SSH de Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER}}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Crear directorio para la app si no existe
            mkdir -p /apps/habit-tracker
            
            # Escribir el archivo de producción directamente en el VPS de forma automatizada
            cat << 'EOF' > /apps/habit-tracker/docker-compose.yml
            version: '3.8'
            services:
              postgres_db:
                image: postgres:15-alpine
                container_name: prod_postgres_db
                restart: always
                environment:
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: secret_password_2026
                  POSTGRES_DB: habit_db
                volumes:
                  - prod_pgdata:/var/lib/postgresql/data
                networks:
                  - traefik-public
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres -d habit_db"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              backend:
                image: ghcr.io/themesenjer/proyecto_final-backend:latest
                container_name: prod_backend
                restart: always
                environment:
                  - DB_HOST=postgres_db
                  - DB_NAME=habit_db
                  - DB_USER=postgres
                  - DB_PASSWORD=secret_password_2026
                depends_on:
                  postgres_db:
                    condition: service_healthy
                networks:
                  - traefik-public
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.habit-backend.rule=Host(`api.devops-yavirac-pablo.duckdns.org`)"
                  - "traefik.http.routers.habit-backend.entrypoints=websecure"
                  - "traefik.http.routers.habit-backend.tls.certresolver=myresolver"
                  - "traefik.http.services.habit-backend-service.loadbalancer.server.port=8000"

              frontend:
                image: ghcr.io/themesenjer/proyecto_final-frontend:latest
                container_name: prod_frontend
                restart: always
                depends_on:
                  - backend
                networks:
                  - traefik-public
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.habit-frontend.rule=Host(`devops-yavirac-pablo.duckdns.org`)"
                  - "traefik.http.routers.habit-frontend.entrypoints=websecure"
                  - "traefik.http.routers.habit-frontend.tls.certresolver=myresolver"
                  - "traefik.http.services.habit-frontend-service.loadbalancer.server.port=80"

              pgadmin:
                image: dpage/pgadmin4:8.4
                container_name: prod_pgadmin
                restart: always
                environment:
                  PGADMIN_DEFAULT_EMAIL: admin@admin.com
                  PGADMIN_DEFAULT_PASSWORD: admin1234
                depends_on:
                  postgres_db:
                    condition: service_healthy
                networks:
                  - traefik-public
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.habit-pgadmin.rule=Host(`db.devops-yavirac-pablo.duckdns.org`)"
                  - "traefik.http.routers.habit-pgadmin.entrypoints=websecure"
                  - "traefik.http.routers.habit-pgadmin.tls.certresolver=myresolver"
                  - "traefik.http.services.habit-pgadmin-service.loadbalancer.server.port=80"

            volumes:
              prod_pgdata:
                driver: local

            networks:
              traefik-public:
                external: true
            EOF

            # Ejecutar el despliegue automático en el VPS descargando las imágenes de GitHub Packages
            cd /apps/habit-tracker
            docker compose pull
            docker compose up -d --remove-orphans